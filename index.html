<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cockpit Executivo - Syneco</title>

<style>
:root {
    --bg: #05070a;
    --card: rgba(22, 27, 34, 0.9);
    --border: #30363d;
    --text: #c9d1d9;
    --blue: #00d1ff;
    --green: #00ff88;
    --yellow: #f39c12;
    --red: #ff4d4d;
}

body {
    background: linear-gradient(135deg, #05070a, #0d1117);
    color: var(--text);
    font-family: 'Segoe UI';
    margin: 0;
    padding: 20px;
}

header {
    text-align: center;
    margin-bottom: 25px;
}

header h1 {
    margin-bottom: 5px;
    color: var(--blue);
}

header p {
    color: #8b949e;
    margin-top: 0;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

select {
    padding: 10px;
    background: #111827;
    color: white;
    border: 1px solid #30363d;
    border-radius: 8px;
    font-size: 14px;
}

.global-status {
    background: var(--card);
    padding: 25px;
    border-radius: 16px;
    margin-bottom: 25px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.global-status h2 {
    margin: 0;
    font-size: 28px;
}

.global-status p {
    margin-top: 5px;
    color: #8b949e;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px,1fr));
    gap: 20px;
}

.card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
    transition: 0.3s;
    box-shadow: 0 6px 15px rgba(0,0,0,0.35);
}

.card:hover {
    transform: translateY(-3px);
}

.card h3 {
    margin-top: 0;
    color: var(--blue);
}

.progress {
    height: 10px;
    background: #222;
    margin-top: 12px;
    margin-bottom: 18px;
    border-radius: 6px;
    overflow: hidden;
}

.bar {
    height: 100%;
    transition: 0.5s;
}

.item {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.item:last-child {
    border-bottom: none;
}

.badge {
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 11px;
}

.footer {
    margin-top: 25px;
    text-align: center;
    color: #6e7681;
    font-size: 12px;
}

</style>
</head>

<body>

<header>
    <h1>Projeto MES - Syneco</h1>
    <p>Status Executivo de Implementação</p>
</header>

<div class="top-bar">
    <div>
        <label>Filtrar Etapas:</label>
        <select id="faseFilter" onchange="render()">
            <option value="all">Todas</option>
            <option value="Fase 1">Fase 1</option>
            <option value="Fase 2">Fase 2</option>
            <option value="Fase 3">Fase 3</option>
            <option value="Fase 4">Fase 4</option>
        </select>
    </div>
</div>

<div class="global-status">
    <h2>Status Geral: <span id="globalPercent">0%</span></h2>
    <p>Avanço consolidado da implementação do Projeto</p>

    <div class="progress">
        <div id="globalBar" class="bar"></div>
    </div>
</div>

<div class="grid" id="grid"></div>

<div class="footer">
    Dashboard Executivo • Projeto MES Syneco • Atualização automática por fase
</div>

<script>

const data = [

/* ==========================
   FASE 1 - MES (SYNECO)
========================== */

{fase:"Fase 1", op:"IoT's funcionando", f1:1, f4:100, f5:95},
{fase:"Fase 1", op:"Integração de Ordens", f1:90, f4:100, f5:100},
{fase:"Fase 1", op:"OEE", f1:1, f4:100, f5:95},
{fase:"Fase 1", op:"Relatórios Base", f1:1, f4:100, f5:90},

/* ==========================
   FASE 2 - MÓDULOS
========================== */

{fase:"Fase 2", op:"Help Chain", f1:0, f4:80, f5:50},
{fase:"Fase 2", op:"CEP", f1:0, f4:100, f5:100},
{fase:"Fase 2", op:"Tools", f1:0, f4:100, f5:0},
{fase:"Fase 2", op:"Paperless", f1:0, f4:100, f5:0},
{fase:"Fase 2", op:"Parada Programada via APS", f1:0, f4:10, f5:0},
{fase:"Fase 2", op:"Parada com ciclo", f1:0, f4:100, f5:0},
{fase:"Fase 2", op:"Cartão Vermelho", f1:0, f4:50, f5:50},
{fase:"Fase 2", op:"Kg/hr", f1:0, f4:25, f5:0},
{fase:"Fase 2", op:"Padronização das Plantas", f1:0, f4:20, f5:0},

/* ==========================
   FASE 3 - CONTROLES
========================== */

{fase:"Fase 3", op:"Controles de MD", f1:0, f4:0, f5:0},
{fase:"Fase 3", op:"Integração de Ordens - Retorno Status ERP", f1:0, f4:0, f5:0},

/* ==========================
   FASE 4 - VARIÁVEIS
========================== */

{fase:"Fase 4", op:"Ciclo, Recall, Dosagem e Temperatura", f1:0, f4:0, f5:0}

];

function getColor(v){
    if(v >= 80) return "var(--green)";
    if(v >= 50) return "var(--yellow)";
    return "var(--red)";
}

function getBadge(v){
    let color = getColor(v);

    return `
        <span class="badge" style="
            background:${color};
            color:${v >= 50 ? '#000' : '#fff'};
        ">
            ${v}%
        </span>
    `;
}

function render(){

    const fase = document.getElementById("faseFilter").value;

    let filtered = fase === "all"
        ? data
        : data.filter(d => d.fase === fase);

    const plantas = {
        "F1: Joinville": [],
        "F4: Paraná": [],
        "F5: São Paulo": []
    };

    filtered.forEach(d=>{
        plantas["F1: Joinville"].push(d.f1);
        plantas["F4: Paraná"].push(d.f4);
        plantas["F5: São Paulo"].push(d.f5);
    });

    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    let globalSum = 0;
    let globalCount = 0;

    for(let planta in plantas){

        let arr = plantas[planta];

        let avg = arr.length
            ? arr.reduce((a,b)=>a+b,0)/arr.length
            : 0;

        globalSum += avg;
        globalCount++;

        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${planta}</h3>

            <h2 style="margin-bottom:5px;">
                ${avg.toFixed(1)}%
            </h2>

            <div class="progress">
                <div class="bar"
                    style="
                        width:${avg}%;
                        background:${getColor(avg)}
                    ">
                </div>
            </div>
        `;

        filtered.forEach(d=>{

            let val =
                planta==="F1: Joinville"
                ? d.f1
                : planta==="F4: Paraná"
                ? d.f4
                : d.f5;

            card.innerHTML += `
                <div class="item">
                    <span>${d.op}</span>
                    ${getBadge(val)}
                </div>
            `;
        });

        grid.appendChild(card);
    }

    let global = globalSum / globalCount;

    document.getElementById("globalPercent")
        .innerText = global.toFixed(1)+"%";

    document.getElementById("globalBar")
        .style.width = global+"%";

    document.getElementById("globalBar")
        .style.background = getColor(global);
}

render();

</script>

</body>
</html>
